# Dev overrides — mounts source for hot reload and exposes debug ports
include:
  - docker-compose.yml

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    env_file: ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DEBUG=True
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy port
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: npm run dev

  celery_worker:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    volumes:
      - ./backend:/app

  # Flower — Celery monitoring UI (dev only)
  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis

  nginx:
    profiles:
      - production  # disabled in dev
